<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Foto af Silas på vej">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#232323"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bgGrad)"/>

  <!-- flowing gold ribbon echoing the logo's S curve -->
  <path d="M 280 120 C 420 120 340 340 460 420 C 580 500 420 620 320 640 C 220 660 260 820 400 880"
        fill="none" stroke="#BC924A" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <path d="M 300 150 C 420 150 360 330 460 410"
        fill="none" stroke="#292929" stroke-width="10" stroke-linecap="round" opacity="0.6"/>

  <!-- simple saxophonist silhouette -->
  <g transform="translate(400,560)" fill="#BC924A" opacity="0.95">
    <path d="M -60 -180
             C -20 -190 20 -180 30 -150
             C 45 -110 20 -80 -10 -70
             C -40 -60 -55 -30 -45 10
             C -35 55 -60 90 -95 95
             L -95 130
             C -55 150 5 150 40 120
             C 90 80 90 20 60 -20
             C 100 -10 120 20 120 60
             C 120 110 90 150 40 160
             C -30 175 -110 140 -130 70
             C -150 0 -120 -80 -60 -110
             C -95 -130 -100 -170 -60 -180 Z"/>
  </g>

  <text x="400" y="940" text-anchor="middle" font-family="'Poppins','Segoe UI',sans-serif"
        font-size="30" letter-spacing="3" fill="#BC924A">FOTO PÅ VEJ</text>
</svg>
